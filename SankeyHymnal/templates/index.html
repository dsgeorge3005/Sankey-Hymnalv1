<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sankey Hymnal — Obsidian Glass Edition</title>

    <style>
    :root {
        --glass-bg: rgba(20, 20, 25, 0.7);
        --glass-border: rgba(255, 255, 255, 0.06);
        --glass-shadow: rgba(0, 0, 0, 0.6);
        --text-color: #f5f5f7;
        --accent-color: #00e676;
        --accent-glow: rgba(0, 230, 118, 0.25);
        --bg-gradient: radial-gradient(circle at 50% 0%, #1c1c24 0%, #0c0c10 100%);
    }

    * { box-sizing: border-box; }

    body {
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
        background: var(--bg-gradient);
        background-attachment: fixed;
        color: var(--text-color);
        margin: 0;
        padding: 20px;
        min-height: 100vh;
        overflow-x: hidden;
    }

    .glass-panel {
        background: var(--glass-bg);
        backdrop-filter: blur(30px) saturate(150%);
        -webkit-backdrop-filter: blur(30px) saturate(150%);
        border: 1px solid var(--glass-border);
        border-radius: 20px;
        box-shadow: 0 12px 40px 0 var(--glass-shadow);
        padding: 24px;
        transition: transform 0.3s ease;
    }

    .container {
        max-width: 900px;
        margin: auto;
        display: flex;
        flex-direction: column;
        gap: 20px;
    }

    h1 {
        text-align: center;
        font-size: 36px;
        font-weight: 800;
        letter-spacing: -0.5px;
        margin: 10px 0;
        background: linear-gradient(180deg, #ffffff 0%, #a1a1aa 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }

    .search-bar {
        display: flex;
        gap: 12px;
    }

    input, select {
        flex: 1;
        padding: 16px 20px;
        border: 1px solid var(--glass-border);
        border-radius: 14px;
        font-size: 16px;
        background: rgba(255, 255, 255, 0.04);
        color: var(--text-color);
        outline: none;
        transition: all 0.2s ease;
    }

    input:focus, select:focus {
        border-color: var(--accent-color);
        box-shadow: 0 0 0 4px var(--accent-glow);
    }

    button, .btn-link {
        background: rgba(255, 255, 255, 0.08);
        color: #fff;
        border: 1px solid var(--glass-border);
        padding: 14px 24px;
        border-radius: 14px;
        cursor: pointer;
        font-size: 15px;
        font-weight: 600;
        transition: all 0.2s ease;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        justify-content: center;
    }

    button:hover, .btn-link:hover {
        background: var(--accent-color);
        color: #000;
        box-shadow: 0 0 20px var(--accent-glow);
        border-color: transparent;
    }

    button:disabled {
        background: rgba(255, 255, 255, 0.02) !important;
        color: rgba(255, 255, 255, 0.2) !important;
        cursor: not-allowed;
        box-shadow: none !important;
    }

    #suggestions {
        border-radius: 14px;
        overflow: hidden;
        margin-top: -8px;
        display: none;
        flex-direction: column;
        background: rgba(15, 15, 20, 0.95);
        z-index: 10;
    }
    .suggestion {
        padding: 14px 20px;
        cursor: pointer;
        border-bottom: 1px solid rgba(255, 255, 255, 0.04);
    }
    .suggestion:hover { background: rgba(255, 255, 255, 0.05); }

    .setlist-controls {
        display: flex;
        gap: 12px;
        align-items: flex-end;
        flex-wrap: wrap;
        margin-bottom: 15px;
    }
    .control-group {
        display: flex;
        flex-direction: column;
        gap: 6px;
        flex: 1;
        min-width: 140px;
    }
    .control-group label { font-size: 13px; font-weight: 600; opacity: 0.6; }

    .setlist-pill-box { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 15px; }
    .setlist-pill {
        background: rgba(255,255,255,0.04);
        border: 1px solid var(--glass-border);
        padding: 8px 16px;
        border-radius: 30px;
        display: flex;
        align-items: center;
        gap: 8px;
    }
    .setlist-pill .remove-btn { color: #ff453a; font-weight: bold; cursor: pointer; }

    .audio-section { margin-top: 25px; border-top: 1px solid rgba(255,255,255,0.06); padding-top: 20px; }
    .audio-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 15px; }
    .audio-card {
        background: rgba(0, 0, 0, 0.2);
        border: 1px solid var(--glass-border);
        border-radius: 12px;
        padding: 15px;
    }
    .voice-part { font-weight: 700; font-size: 14px; margin-bottom: 8px; color: var(--accent-color); }
    audio { width: 100%; height: 32px; filter: invert(0.9) hue-rotate(180deg); }

    img { width: 100%; height: auto; border-radius: 12px; margin-top: 20px; border: 1px solid var(--glass-border); }

    .side-drawer {
        position: fixed;
        top: 0;
        right: -390px;
        width: 360px;
        height: 100%;
        z-index: 1000;
        transition: right 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        padding: 24px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 25px;
        background: rgba(10, 10, 12, 0.95);
    }
    .side-drawer.open { right: 0; }
    
    .piano { display: flex; height: 120px; background: #000; padding: 2px; border-radius: 8px; }
    .white-key { flex: 1; background: #eee; border: 1px solid #999; border-radius: 0 0 4px 4px; cursor: pointer; }
    .white-key:active { background: #bbb; }
    .black-key { position: absolute; width: 6.5%; height: 60%; background: #222; border-radius: 0 0 3px 3px; cursor: pointer; transform: translateX(-50%); }
    .black-key:active { background: #000; }

    .metro-visuals { display: flex; justify-content: center; gap: 8px; margin: 10px 0; }
    .metro-dot { width: 10px; height: 10px; background: rgba(255,255,255,0.1); border-radius: 50%; }
    .metro-dot.active { background: var(--accent-color); box-shadow: 0 0 10px var(--accent-color); }
    </style>
</head>
<body>

<div id="musicalDrawer" class="side-drawer glass-panel">
    <div style="display:flex; justify-content:between; align-items:center;">
        <h2 style="margin:0; font-size:20px;">🎼 Toolkit</h2>
        <button onclick="toggleDrawer()" style="padding: 6px 12px; margin-left:auto;">✕</button>
    </div>

    <div style="display:flex; flex-direction:column; gap:12px;">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <button onclick="shiftOctave(-1)">◀</button>
            <span id="octaveDisplay" style="font-weight:bold;">Octave: 4</span>
            <button onclick="shiftOctave(1)">▶</button>
        </div>
        <div class="piano">
            <div class="white-key" onclick="playTone('C')"></div>
            <div class="white-key" onclick="playTone('D')"></div>
            <div class="white-key" onclick="playTone('E')"></div>
            <div class="white-key" onclick="playTone('F')"></div>
            <div class="white-key" onclick="playTone('G')"></div>
            <div class="white-key" onclick="playTone('A')"></div>
            <div class="white-key" onclick="playTone('B')"></div>
            <div class="white-key" onclick="playTone('C2')"></div>
            <div class="black-key" style="left: 12.5%;" onclick="playTone('C#')"></div>
            <div class="black-key" style="left: 26.5%;" onclick="playTone('D#')"></div>
            <div class="black-key" style="left: 53.5%;" onclick="playTone('F#')"></div>
            <div class="black-key" style="left: 67.5%;" onclick="playTone('G#')"></div>
            <div class="black-key" style="left: 81.5%;" onclick="playTone('A#')"></div>
        </div>
    </div>

    <div style="display:flex; flex-direction:column; gap:12px;">
        <div style="display:flex; justify-content:space-between; font-weight:700;">
            <span>Metronome</span>
            <span id="bpmDisplay">100 BPM</span>
        </div>
        <input type="range" id="tempoSlider" min="40" max="220" value="100" oninput="updateBpm(this.value)">
        <div class="metro-visuals" id="metroVisualsContainer"></div>
        <button id="metroBtn" onclick="toggleMetronome()">▶ Start</button>
    </div>
</div>

<div class="container">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <button onclick="toggleDashboard()">📂 Setlist Builder</button>
        <button onclick="toggleDrawer()" style="background:rgba(255,255,255,0.05);">🎵 Toolkit</button>
    </div>

    <div id="weeklyDashboard" style="display:none;">
        <div class="glass-panel">
            <h3 style="margin:0 0 15px 0;">📋 Setlist Configuration</h3>
            <div class="setlist-controls">
                <div class="control-group">
                    <label>Target Set Index</label>
                    <select id="setlistNumSelect" onchange="renderActiveSetlistPills()">
                        <option value="1">Configuration Set 1</option>
                        <option value="2">Configuration Set 2</option>
                    </select>
                </div>
                <div class="control-group" style="flex:1.2; flex-direction:row; align-items:flex-end; gap:8px;">
                    <div style="flex:1; display:flex; flex-direction:column; gap:6px;">
                        <label>Hymn ID #</label>
                        <input type="number" id="quickAddHymnNum" placeholder="e.g. 10">
                    </div>
                    <button onclick="addHymnToActiveSetlist()" style="height:52px;">+ Add</button>
                </div>
            </div>
            <div class="setlist-pill-box" id="activeSetlistContainer"></div>
        </div>
    </div>

    <h1>Sankey Hymnal</h1>

    <div class="search-bar">
        <input id="searchBox" placeholder="Search by compilation index number or title query..." autocomplete="off">
        <button onclick="searchHymn()">Search</button>
    </div>
    
    <div id="suggestions"></div>
    <div id="results"></div>
    <div id="scoreViewer"></div>
</div>

<script>
// FULL STRUCTURAL LOCAL DATA RESOURCE REGISTRY
const localHymnsDataset = [
  { "number": "1", "title": "Praise, My Soul, The King Of Heaven!", "page": "1", "hasSATB": true },
  { "number": "2", "title": "A Mighty Fortress Is Our God", "page": "2", "hasSATB": false },
  { "number": "3", "title": "A Safe Stronghold", "page": "2", "hasSATB": false },
  { "number": "4", "title": "O Worship the Lord in the Beauty of Holiness", "page": "3", "hasSATB": false },
  { "number": "10", "title": "Day by Day the manna fell", "page": "10", "hasSATB": true },
  { "number": "11", "title": "Oh, Worship the King", "page": "11", "hasSATB": true },
  { "number": "102", "title": "Hallelujah What a Savior", "page": "102", "hasSATB": true },
  { "number": "111", "title": "Joy to the World", "page": "111", "hasSATB": true },
  { "number": "112", "title": "How Sweet the Name", "page": "112", "hasSATB": true },
  { "number": "113", "title": "Blessed Be the Fountain", "page": "113", "hasSATB": true },
  { "number": "1000", "title": "The Lord's My Shepherd", "page": "1000", "hasSATB": false },
  { "number": "1001", "title": "Rock of Ages", "page": "1001", "hasSATB": false },
  { "number": "1084", "title": "Jesus shall reign", "page": "1084", "hasSATB": true },
  { "number": "1131", "title": "Tell me the Old, Old Story", "page": "1131", "hasSATB": true },
  { "number": "1134", "title": "There is a Green Hill Far Away (2nd tune)", "page": "1134", "hasSATB": true }
];

/* SOUND MODULE ENGINE */
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
let activeOctave = 4;
const baseFrequencies = { 'C':16.35, 'C#':17.32, 'D':18.35, 'D#':19.45, 'E':20.60, 'F':21.83, 'F#':23.12, 'G':24.50, 'G#':25.96, 'A':27.50, 'A#':29.14, 'B':30.87, 'C2':32.70 };

function playTone(note) {
    let fundamental = baseFrequencies[note] * Math.pow(2, activeOctave);
    let now = audioCtx.currentTime;
    let gain = audioCtx.createGain();
    gain.connect(audioCtx.destination);
    gain.gain.setValueAtTime(0, now);
    gain.gain.linearRampToValueAtTime(0.2, now + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 1.0);
    let osc = audioCtx.createOscillator();
    osc.type = 'triangle';
    osc.frequency.setValueAtTime(fundamental, now);
    osc.connect(gain); osc.start(now); osc.stop(now + 1.0);
}
function shiftOctave(dir) { activeOctave = Math.max(2, Math.min(6, activeOctave + dir)); document.getElementById("octaveDisplay").innerText = "Octave: " + activeOctave; }
function toggleDrawer() { document.getElementById("musicalDrawer").classList.toggle("open"); }

/* METRONOME */
let metroInterval = null, isMetroRunning = false, bpm = 100, currentBeat = 0, beatsPerMeasure = 4;
function updateBpm(val) { bpm = val; document.getElementById("bpmDisplay").innerText = val + " BPM"; if (isMetroRunning) { stopMetronome(); startMetronome(); } }
function toggleMetronome() { if (isMetroRunning) stopMetronome(); else startMetronome(); }
function startMetronome() {
    isMetroRunning = true; document.getElementById("metroBtn").innerText = "⏹ Stop";
    metroInterval = setInterval(() => {
        for(let i=0; i<beatsPerMeasure; i++) document.getElementById(`dotM${i}`)?.classList.remove('active');
        document.getElementById(`dotM${currentBeat}`)?.classList.add('active');
        currentBeat = (currentBeat + 1) % beatsPerMeasure;
    }, (60 / bpm) * 1000);
}
function stopMetronome() { isMetroRunning = false; clearInterval(metroInterval); document.getElementById("metroBtn").innerText = "▶ Start"; currentBeat = 0; }

/* CONFIGURATION MANAGEMENT SELECTION PLATES */
let mockSetlists = { "1": ["1", "10"], "2": [] };
function renderActiveSetlistPills() {
    const setNum = document.getElementById("setlistNumSelect").value;
    const hymns = mockSetlists[setNum] || [];
    const container = document.getElementById("activeSetlistContainer");
    if(!hymns.length) { container.innerHTML = "<div style='opacity:0.4;'>Empty configuration container.</div>"; return; }
    container.innerHTML = hymns.map(num => `
        <div class="setlist-pill">
            <span onclick="quickLoad('${num}')" style="cursor:pointer;">🎵 Hymn ${num}</span>
            <span class="remove-btn" onclick="removeHymn('${num}')">×</span>
        </div>
    `).join('');
}
function addHymnToActiveSetlist() {
    const num = document.getElementById("quickAddHymnNum").value.trim();
    const setNum = document.getElementById("setlistNumSelect").value;
    if(num && !mockSetlists[setNum].includes(num)) { mockSetlists[setNum].push(num); renderActiveSetlistPills(); }
    document.getElementById("quickAddHymnNum").value = "";
}
function removeHymn(num) {
    const setNum = document.getElementById("setlistNumSelect").value;
    mockSetlists[setNum] = mockSetlists[setNum].filter(n => n !== num);
    renderActiveSetlistPills();
}

/* RENDERING & SEARCH ENGINE ROUTE PARSERS */
const searchBox = document.getElementById("searchBox");
const suggestionsBox = document.getElementById("suggestions");
let searchResultsCache = [], activeHymnPages = [], currentImageIndex = 0;

function toggleDashboard() { const d = document.getElementById("weeklyDashboard"); d.style.display = d.style.display === "none" ? "block" : "none"; }

searchBox.addEventListener("input", () => {
    let q = searchBox.value.trim().toLowerCase();
    if(!q) { suggestionsBox.style.display = "none"; return; }
    let matches = localHymnsDataset.filter(h => h.number.includes(q) || h.title.toLowerCase().includes(q));
    if(!matches.length) { suggestionsBox.style.display = "none"; return; }
    suggestionsBox.innerHTML = matches.slice(0, 5).map(h => `<div class="suggestion" onclick="selectSuggestion('${h.number}')"><strong>${h.number}</strong> — ${h.title}</div>`).join('');
    suggestionsBox.style.display = "flex";
});

function selectSuggestion(num) { searchBox.value = num; suggestionsBox.style.display = "none"; searchHymn(num); }
function quickLoad(num) { searchBox.value = num; searchHymn(num); }

function searchHymn(targetNum = null) {
    let q = targetNum || searchBox.value.trim();
    if(!q) return;
    suggestionsBox.style.display = "none";

    let results = localHymnsDataset.filter(h => h.number === q || h.title.toLowerCase().includes(q.toLowerCase()));
    let container = document.getElementById("results");
    
    if(!results.length) {
        container.innerHTML = `<div class="glass-panel">No structural elements found matching criteria.</div>`;
        document.getElementById("scoreViewer").innerHTML = "";
        return;
    }

    searchResultsCache = results;
    let html = "";

    results.forEach((hymn, index) => {
        const ytUrl = "https://www.youtube.com/results?search_query=" + encodeURIComponent(hymn.title + " sankey hymn");
        let audioHtml = "";

        // Only generate audio UI panels if the hymn actually contains SATB tracks
        if (hymn.hasSATB) {
            const partsMap = {
                "Full Ensemble SATB": `${hymn.number}-SATB-${hymn.title}.mp3`,
                "Soprano Vocal Track": `${hymn.number}-S-${hymn.title}.mp3`,
                "Alto Vocal Track": `${hymn.number}-A-${hymn.title}.mp3`,
                "Tenor Vocal Track": `${hymn.number}-T-${hymn.title}.mp3`
            };

            audioHtml = `<div class="audio-section"><h3>🎵 SATB Split Vocal Tracks</h3><div class="audio-grid">`;
            for (const [partName, fileName] of Object.entries(partsMap)) {
                audioHtml += `
                    <div class="audio-card">
                        <div class="voice-part">${partName}</div>
                        <audio controls preload="none">
                            <source src="/SANKEY_Learning_files/${encodeURIComponent(hymn.number + '-' + hymn.title.replace('!', ''))}/${encodeURIComponent(fileName)}" type="audio/mpeg">
                        </audio>
                    </div>`;
            }
            audioHtml += `</div></div>`;
        }

        html += `
        <div class="glass-panel" style="margin-top:20px;">
            <h2>${hymn.number} — ${hymn.title}</h2>
            <p style="opacity:0.6;">Sankey Compendium Page Reference: ${hymn.page}</p>
            <div style="display:flex; gap:12px; margin-top:15px; flex-wrap:wrap;">
                <button onclick="calculateAndShowScore(${index})">🔍 View Score Sheet</button>
                <a class="btn-link" target="_blank" href="${ytUrl}">📺 Find on YouTube</a>
            </div>
            ${audioHtml}
        </div>`;
    });

    container.innerHTML = html;
    calculateAndShowScore(0);
}

/* DYNAMIC ALLOCATION RESOLVER FOR STATIC / PAGES2 ROUTING BOUNDARIES */
function calculateAndShowScore(index) {
    let hymn = searchResultsCache[index];
    if(!hymn) return;
    
    activeHymnPages = [];
    const pageVal = parseInt(hymn.page, 10);
    
    // Check if pages span multiple boundaries (e.g., 2-3)
    if (String(hymn.page).includes("-")) {
        let ranges = String(hymn.page).split("-");
        let start = parseInt(ranges[0], 10);
        let end = parseInt(ranges[1], 10);
        for(let p = start; p <= end; p++) {
            let targetFolder = (p > 1000) ? "pages2" : "pages";
            activeHymnPages.push(`/static/${targetFolder}/Sankey_${p}.jpg`);
        }
    } else {
        // Single page entry allocation rule pathing logic
        let targetFolder = (pageVal > 1000) ? "pages2" : "pages";
        activeHymnPages.push(`/static/${targetFolder}/Sankey_${pageVal}.jpg`);
    }

    currentImageIndex = 0;
    renderPage();
}

function renderPage() {
    let container = document.getElementById("scoreViewer");
    if(!activeHymnPages.length) { container.innerHTML = ""; return; }
    
    container.innerHTML = `
        <div class="glass-panel" style="margin-top:20px; text-align:center;">
            <div style="display:flex; justify-content:center; gap:10px; margin-bottom:15px;">
                <button onclick="previousPage()" ${currentImageIndex===0?'disabled':''}>← Previous</button>
                <button disabled style="background:transparent; color:#fff; opacity:1 !important; border-color:var(--glass-border);">Sheet View (${currentImageIndex+1}/${activeHymnPages.length})</button>
                <button onclick="nextPage()" ${currentImageIndex===activeHymnPages.length-1?'disabled':''}>Next →</button>
            </div>
            <img src="${activeHymnPages[currentImageIndex]}" onerror="handleImageError(this, '${activeHymnPages[currentImageIndex]}')">
        </div>`;
}

function handleImageError(img, url) {
    if (!img.getAttribute('data-retry') && url.endsWith('.jpg')) {
        img.setAttribute('data-retry', '1');
        img.src = url.replace('.jpg', '.png');
        return;
    }
    img.style.display = 'none';
}

function nextPage() { if(currentImageIndex < activeHymnPages.length-1) { currentImageIndex++; renderPage(); } }
function previousPage() { if(currentImageIndex > 0) { currentImageIndex--; renderPage(); } }

window.onload = () => {
    let html = ""; for(let i=0; i<4; i++) html += `<div class="metro-dot" id="dotM${i}"></div>`;
    document.getElementById("metroVisualsContainer").innerHTML = html;
    renderActiveSetlistPills();
};
</script>
</body>
</html>
